<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhanaVote</title>
<style>
:root{--bg:#0c1220;--card:#172033;--accent:#3b82f6;--text:#e5e7eb;--muted:#9ca3af;--border:#263244}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Arial,sans-serif}
body{background:var(--bg);color:var(--text);padding:24px}
.container{max-width:1200px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
.logo{font-size:24px;font-weight:700}.logo span{color:var(--accent)}
nav{display:flex;gap:12px}
nav button{background:transparent;border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:8px;cursor:pointer}
nav button:hover{background:var(--accent);border-color:var(--accent)}
section{display:none}section.active{display:block}
h1{font-size:32px;font-weight:700;margin-bottom:8px;text-align:center}
.subtitle{text-align:center;color:var(--muted);margin-bottom:32px}
.card{background:var(--card);padding:28px;border-radius:14px;border:1px solid var(--border)}
input,button,select{width:100%;padding:13px 16px;margin:10px 0;border:none;border-radius:8px;font-size:15px}
input,select{background:#0f172a;color:var(--text);border:1px solid var(--border)}
button{background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
button:hover{background:#2563eb}button:disabled{background:#374151;cursor:not-allowed}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.candidate{background:#0f172a;border:1px solid var(--border);padding:20px;border-radius:12px;text-align:center}
.candidate img{width:80px;height:80px;border-radius:50%;margin-bottom:12px;object-fit:cover;background:#1e293b}
.candidate.voted{border:2px solid var(--accent)}
.toast{position:fixed;bottom:30px;right:30px;background:var(--accent);color:#fff;padding:14px 24px;border-radius:8px;display:none;z-index:2000}
.toast.show{display:block}
.loading{text-align:center;padding:60px;color:var(--muted)}
.error{background:#7f1d1d;color:#fecaca;padding:16px;border-radius:8px;margin:20px 0}
.hidden{display:none}
.position-title{font-size:22px;color:var(--accent);margin:40px 0 20px;font-weight:600}
.user-info{display:flex;align-items:center;gap:16px;margin-bottom:32px;padding:20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.user-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Ghana<span>Vote</span></div>
    <nav>
      <button onclick="show('vote')">Voting</button>
      <button onclick="show('results')">Results</button>
      <button id="authBtn" onclick="toggleAuth()">Sign In</button>
    </nav>
  </header>

  <div id="errorBox"></div>

  <section id="vote" class="active">
    <h1>Ballot Paper</h1>
    <p class="subtitle">Select one candidate per position</p>
    <div id="userInfo" class="hidden"></div>
    <div id="positions"><div class="loading">Loading candidates...</div></div>
  </section>

  <section id="results">
    <h1>Results</h1>
    <div id="resultsContent"><div class="loading">Loading...</div></div>
  </section>

  <section id="auth">
    <h1>Voter Access</h1>
    <div class="card" style="max-width:480px;margin:0 auto">
      <input id="ghanaCard" placeholder="Ghana Card Number - GHA-123456789-0">
      <input id="name" placeholder="Full Name">
      <button onclick="loginVoter()">Access Ballot</button>
      <hr style="margin:20px 0;border-color:var(--border)">
      <input id="adminUser" placeholder="Admin Username">
      <input id="adminPass" type="password" placeholder="Admin Password">
      <button onclick="loginAdmin()">Admin Login</button>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// UPDATED CANDIDATE LIST
const DEFAULT_CANDIDATES = {
  president: [
    {id:"p1", name:"Mensah Benedicta"},
    {id:"p2", name:"Dahamatu Tahiru"},
    {id:"p3", name:"Naomi Mensah"}
  ],
  vicePresident: [
    {id:"vp1", name:"Owusu Ansah Mannis Debrah"},
    {id:"vp2", name:"Evans Mensah"},
    {id:"vp3", name:"Mickel Adomako"},
    {id:"vp4", name:"Raymond Ntiamoah"},
    {id:"vp5", name:"Venvalt Margaret Acheampomaah"}
  ],
  secretary: [
    {id:"s1", name:"Emmanuella Deruel"},
    {id:"s2", name:"Kingsley Ayim Nyarko"},
    {id:"s3", name:"Agumah Victor"},
    {id:"s4", name:"Awuah Baffour Ellen"},
    {id:"s5", name:"Hussein"},
    {id:"s6", name:"Owusu Afriyie Victor"},
    {id:"s7", name:"Anna Adwabi Agyei"}
  ],
  dept1: [
    {id:"d1c1", name:"Bimpeh Grace Serwaah"},
    {id:"d1c2", name:"Charles Oduro"},
    {id:"d1c3", name:"Razak Abudu"}
  ],
  dept2: [
    {id:"d2c1", name:"Sumailla Fuseini"},
    {id:"d2c2", name:"Abigail Tetteh"},
    {id:"d2c3", name:"Abdul Karim Ibrahim Seidu"}
  ],
  dept3: [
    {id:"d3c1", name:"Owusu Blessing"},
    {id:"d3c2", name:"Amankwah Richard"},
    {id:"d3c3", name:"Aseidu Benson"}
  ]
};

const ADMIN = {user:"Azon", pass:"Akwasi2006"};
let state = {user:null, isAdmin:false, data:{candidates:DEFAULT_CANDIDATES, votes:{}, votingEnded:false}, firebaseConnected:false};

const savedUser = localStorage.getItem('user');
if(savedUser){
  state.user = JSON.parse(savedUser);
  state.isAdmin = localStorage.getItem('isAdmin') === 'true';
}

function showError(msg){
  console.error(msg);
  document.getElementById('errorBox').innerHTML = `<div class="error"><strong>Error:</strong> ${msg}</div>`;
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

try{
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getFirestore, doc, setDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

  const firebaseConfig = {
    apiKey: "xxx",
    authDomain: "xxx.firebaseapp.com",
    projectId: "xxx"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  onSnapshot(doc(db, "election", "main"), (snap) => {
    if(snap.exists()){
      state.data = snap.data();
    } else {
      state.data = {candidates:DEFAULT_CANDIDATES, votes:{}, votingEnded:false};
      setDoc(doc(db, "election", "main"), state.data);
    }
    state.firebaseConnected = true;
    render();
  }, (error) => {
    showError("Firebase error: " + error.message);
    render();
  });

  window.saveToFirebase = async () => {
    if(state.firebaseConnected){
      await setDoc(doc(db, "election", "main"), state.data);
    }
  };

}catch(e){
  showError("Firebase failed: " + e.message);
  render();
}

function render(){
  renderUserInfo();
  renderVoting();
  renderResults();
  updateAuthBtn();
}

function renderUserInfo(){
  const div = document.getElementById('userInfo');
  if(state.user &&!state.isAdmin){
    div.classList.remove('hidden');
    div.innerHTML = `
      <div class="user-avatar">${state.user.name.charAt(0).toUpperCase()}</div>
      <div>
        <h3>${state.user.name}</h3>
        <p style="color:var(--muted)">${state.user.ghanaCard}</p>
      </div>
    `;
  } else {
    div.classList.add('hidden');
  }
}

function renderVoting(){
  const container = document.getElementById('positions');
  if(!state.user || state.isAdmin){
    container.innerHTML = '<div class="loading">Please sign in to vote</div>';
    return;
  }

  const userVotes = state.data.votes[state.user.ghanaCard] || {};
  let html = '';

  html += positionHTML('President', 'president', userVotes.president);
  html += positionHTML('Vice President', 'vicePresident', userVotes.vicePresident);
  html += positionHTML('Secretary', 'secretary', userVotes.secretary);
  html += '<h2 class="position-title">Department 1</h2>' + positionHTML('', 'dept1', userVotes.dept1);
  html += '<h2 class="position-title">Department 2</h2>' + positionHTML('', 'dept2', userVotes.dept2);
  html += '<h2 class="position-title">Department 3</h2>' + positionHTML('', 'dept3', userVotes.dept3);

  container.innerHTML = html;
}

function positionHTML(title, key, votedId){
  const list = state.data.candidates[key] || [];
  if(!list.length)return '';

  const header = title? `<h3 class="position-title">${title}</h3>` : '';

  return header + `
    <div class="grid">
      ${list.map(c => `
        <div class="candidate ${votedId===c.id?'voted':''}">
          <div style="width:80px;height:80px;border-radius:50%;background:#1e293b;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700">${c.name.charAt(0)}</div>
          <h4>${c.name}</h4>
          <button ${votedId || state.data.votingEnded?'disabled':''} onclick="castVote('${key}','${c.id}')">
            ${votedId===c.id?'Voted':'Vote'}
          </button>
        </div>
      `).join('')}
    </div>
  `;
}

function renderResults(){
  const content = document.getElementById('resultsContent');
  let html = '';

  Object.keys(state.data.candidates).forEach(key => {
    const candidates = state.data.candidates[key];
    html += `<h3 class="position-title">${key.replace(/([A-Z])/g,' $1').trim()}</h3>`;
    html += '<div class="card"><table style="width:100%"><tr><th>Candidate</th><th>Votes</th></tr>';

    candidates.forEach(c => {
      let votes = 0;
      Object.values(state.data.votes).forEach(v => {if(v[key]===c.id)votes++;});
      html += `<tr><td>${c.name}</td><td>${votes}</td></tr>`;
    });

    html += '</table></div>';
  });

  content.innerHTML = html;
}

function updateAuthBtn(){
  document.getElementById('authBtn').textContent = state.user? 'Sign Out' : 'Sign In';
}

window.show = (page) => {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

window.toggleAuth = () => {
  if(state.user){
    state.user = null;
    state.isAdmin = false;
    localStorage.clear();
    showToast("Signed out");
    render();
  } else {
    show('auth');
  }
}

window.loginVoter = async () => {
  const ghanaCard = document.getElementById('ghanaCard').value.trim().toUpperCase();
  const name = document.getElementById('name').value.trim();

  if(!ghanaCard ||!name){showToast("Fill all fields");return;}
  if(!/^GHA-\d{9}-\d$/.test(ghanaCard)){showToast("Invalid format. Use: GHA-123456789-0");return;}

  state.user = {ghanaCard, name};
  state.data.votes[ghanaCard] = state.data.votes[ghanaCard] || {};
  localStorage.setItem('user', JSON.stringify(state.user));

  await window.saveToFirebase?.();
  showToast("Logged in successfully");
  show('vote');
  render();
}

window.loginAdmin = () => {
  const user = document.getElementById('adminUser').value.trim();
  const pass = document.getElementById('adminPass').value.trim();

  if(user===ADMIN.user && pass===ADMIN.pass){
    state.isAdmin = true;
    state.user = "Admin";
    localStorage.setItem('isAdmin','true');
    localStorage.setItem('user', JSON.stringify(state.user));
    showToast("Admin logged in");
    show('results');
    render();
  } else {
    showToast("Invalid admin credentials");
  }
}

window.castVote = async (position, candidateId) => {
  if(!state.user){showToast("Login first");return;}
  if(state.data.votingEnded){showToast("Voting closed");return;}

  state.data.votes[state.user.ghanaCard][position] = candidateId;
  await window.saveToFirebase?.();
  showToast("Vote recorded");
  render();
}

render();
</script>
</body>
</html>
